name: Sync Project Legal Docs

on:
  workflow_dispatch:
  schedule:
    - cron: "23 4 * * *"
  repository_dispatch:
    types: [legal-docs-updated]

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync legal docs
        env:
          SOURCE_REPOS: ${{ vars['SOURCE_REPOS'] }}
          SOURCE_BRANCH: ${{ vars['SOURCE_BRANCH'] }}
          SOURCE_BASE: ${{ vars['SOURCE_BASE'] }}
        run: bash scripts/sync-project-legal-docs.sh

      - name: Commit changes
        run: |
          git add -A

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "sync: update project legal docs"
          git push
